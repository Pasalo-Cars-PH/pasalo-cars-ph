<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Pasalo Cars PH</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#1B1D21; --paper:#F3EFE6; --signal:#FFC933; --plate-blue:#25476E; --white:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Work Sans',sans-serif; background:var(--asphalt); color:var(--white);
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:24px;
  }
  .wrap{max-width:480px;}
  .code{font-family:'Anton',sans-serif; font-size:96px; color:var(--signal); line-height:1; margin-bottom:8px;}
  h1{font-family:'Anton',sans-serif; text-transform:uppercase; font-size:24px; margin-bottom:12px; letter-spacing:0.5px;}
  p{font-size:15px; color:#C9CCD1; margin-bottom:28px; line-height:1.6;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--signal); color:var(--asphalt); font-weight:700; font-size:15px;
    padding:14px 26px; border-radius:6px; text-decoration:none;
  }
  .brand{font-family:'Anton',sans-serif; font-size:14px; color:#9CA0A6; margin-top:32px; letter-spacing:1px;}
  .brand span{color:var(--signal);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Hindi Mahanap ang Page</h1>
    <p>Baka na-move na, na-delete, o mali ang link na sinundan mo. I-check ang aming kasalukuyang listahan ng available units.</p>
    <a href="index.html#units" class="btn">Balik sa Available Units</a>
    <div class="brand">PASALO <span>CARS</span> PH</div>
  </div>
</body>
</html>
