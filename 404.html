<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>Page Not Found | Pasalo Cars PH</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#1B1D21; --signal:#FFC933; --paper:#F3EFE6; --plate-blue:#25476E; --white:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Work Sans',sans-serif; background:var(--asphalt); color:var(--white);
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
  }
  .wrap{max-width:480px;}
  h1{font-family:'Anton',sans-serif; font-size:96px; color:var(--signal); line-height:1; margin-bottom:8px;}
  h2{font-family:'Anton',sans-serif; font-size:22px; text-transform:uppercase; margin-bottom:14px;}
  p{color:#C9CCD1; font-size:15px; margin-bottom:28px;}
  .btn{
    display:inline-block; background:var(--signal); color:var(--asphalt); font-weight:700;
    padding:14px 28px; border-radius:6px;
  }
  .btn:hover{opacity:0.9;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>Hindi Mahanap ang Page</h2>
    <p>Baka na-move o na-delete na ang link na ito. Pero maraming units pa rin kaming available — tingnan mo!</p>
    <a href="index.html" class="btn">Bumalik sa Home</a>
  </div>
