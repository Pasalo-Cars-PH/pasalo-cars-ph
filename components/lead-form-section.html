<!-- LEAD FORM SECTION -->
<section class="section lead-form" id="lead-inquiry">
  <div class="wrap">
    <div class="section-head">
      <span class="eyebrow-dark">GET IN TOUCH</span>
      <h2>Interested? Send Us a Message</h2>
      <p>Fill out this form and we'll get back to you within 24 hours with more details about the vehicle you're interested in.</p>
    </div>

    <form id="leadForm" class="lead-form-grid">
      <input 
        type="text" 
        name="name" 
        placeholder="Your Full Name" 
        required 
        aria-label="Full Name"
      >
      <input 
        type="email" 
        name="email" 
        placeholder="Your Email Address" 
        required 
        aria-label="Email Address"
      >
      <input 
        type="tel" 
        name="phone" 
        placeholder="Your Phone Number" 
        required 
        aria-label="Phone Number"
      >
      <select name="vehicle" aria-label="Vehicle Interest">
        <option value="">Select a vehicle (optional)</option>
        <option value="2026 Ford Ranger Raptor 4x4 A/T">2026 Ford Ranger Raptor 4x4 A/T</option>
        <option value="2025 BAIC B60 TDi Hybrid">2025 BAIC B60 TDi Hybrid</option>
        <option value="2026 Toyota Fortuner G A/T">2026 Toyota Fortuner G A/T</option>
        <option value="2025 Honda Civic V CVT A/T">2025 Honda Civic V CVT A/T</option>
        <option value="2025 Toyota Hilux GR-S 4x4 A/T">2025 Toyota Hilux GR-S 4x4 A/T</option>
        <option value="Mitsubishi Xpander Cross A/T">Mitsubishi Xpander Cross A/T</option>
        <option value="2026 Toyota Wigo G CVT">2026 Toyota Wigo G CVT</option>
        <option value="2025 Chery Tiggo REV CDM">2025 Chery Tiggo REV CDM</option>
        <option value="2026 Toyota Yaris Cross Hybrid">2026 Toyota Yaris Cross Hybrid</option>
        <option value="2024 Mazda MX-5 Miata">2024 Mazda MX-5 Miata</option>
        <option value="2026 Toyota Innova Zenix Q HEV">2026 Toyota Innova Zenix Q HEV</option>
        <option value="2026 Ford Everest Titanium 4x2">2026 Ford Everest Titanium 4x2</option>
        <option value="2026 Montero Sport GLS">2026 Montero Sport GLS</option>
        <option value="2026 Nissan Patrol V6 Twin Turbo">2026 Nissan Patrol V6 Twin Turbo</option>
        <option value="2026 Toyota Land Cruiser 300 ZX">2026 Toyota Land Cruiser 300 ZX</option>
        <option value="2026 Honda Civic RS Turbo">2026 Honda Civic RS Turbo</option>
        <option value="2026 MG 4 AT Electric Vehicle">2026 MG 4 AT Electric Vehicle</option>
        <option value="2026 Suzuki Ertiga Hybrid AT">2026 Suzuki Ertiga Hybrid AT</option>
        <option value="2026 Toyota Avanza E CVT">2026 Toyota Avanza E CVT</option>
      </select>
      <textarea 
        name="message" 
        placeholder="Tell us more about your interest (optional)..." 
        style="grid-column:1/-1; min-height:100px; font-family:'Work Sans',sans-serif; font-size:14px; padding:13px 16px; border:1.5px solid var(--line); border-radius:8px; background:var(--asphalt-2); color:var(--white); resize:vertical;"
        aria-label="Message"
      ></textarea>
      <button type="submit" class="btn btn-primary" style="grid-column:1/-1;">Send Message</button>
    </form>

    <p class="lead-form-note">🔒 Your information is safe. We'll only use it to respond to your inquiry.</p>
  </div>
</section>
